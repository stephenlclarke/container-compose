# Hawkeye's required Swift license separator intentionally has no space after
# `//`; keep that repository-wide header convention out of source lint results.
disabled_rules:
  - comment_spacing
  # SwiftFormat owns multiline statement brace placement.
  - opening_brace
  - trailing_comma

# Preserve readable API signatures and exact user-facing diagnostics. Structural
# complexity and ordinary implementation lines remain subject to the defaults.
line_length:
  warning: 120
  error: 200
  ignores_function_declarations: true
  ignores_interpolated_strings: true

# `cache_to` is part of the Compose build vocabulary, so its in-memory API
# deliberately exposes the concise `to` member next to `from`. The public
# command-running API uses the standard `io` abbreviation for stream handling.
identifier_name:
  excluded:
    - id
    - io
    - to

# The normalized Compose schema is intentionally broad. It is split by concern
# where that improves ownership, while 1,000 lines remains the actionable size
# limit for a single schema source file.
file_length:
  warning: 1000
  error: 1200
