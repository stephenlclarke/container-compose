server {
    listen 80 default_server;
    server_name _;
    location = /healthz { return 200 "ok\n"; }
    location = / { return 302 /grafana/; }
    location /grafana/ { proxy_set_header Host $host; proxy_set_header X-Forwarded-Prefix /grafana; proxy_pass http://host.docker.internal:3000; }
    location /prometheus/ { proxy_pass http://host.docker.internal:9090; }
    location /alertmanager/ { proxy_pass http://host.docker.internal:9093; }
    location /loki/ { proxy_pass http://host.docker.internal:3100; }
    location /pushgateway/ { rewrite ^/pushgateway/(.*)$ /$1 break; proxy_pass http://host.docker.internal:9091; }
    location /cadvisor/ { rewrite ^/cadvisor/(.*)$ /$1 break; proxy_pass http://host.docker.internal:9105; }
    location /tempo/ { rewrite ^/tempo/(.*)$ /$1 break; proxy_pass http://host.docker.internal:3200; }
}
