global:
  scrape_interval: 15s
scrape_configs:
  - job_name: prometheus
    metrics_path: /prometheus/metrics
    static_configs: [{targets: [localhost:9090]}]
  - job_name: cadvisor
    static_configs: [{targets: [host.docker.internal:9105]}]
  - job_name: pushgateway
    static_configs: [{targets: [host.docker.internal:9091]}]
  - job_name: alertmanager
    metrics_path: /alertmanager/metrics
    static_configs: [{targets: [host.docker.internal:9093]}]
  - job_name: loki
    static_configs: [{targets: [host.docker.internal:3100]}]
  - job_name: tempo
    static_configs: [{targets: [host.docker.internal:3200]}]
