name: Homebrew

on:
  push:
    branches:
      - main
    paths:
      - "Tools/release/container-compose.rb.in"
      - "Tools/release/update-homebrew-formula.py"
      - "Tools/release/test_update_homebrew_formula.py"
      - ".github/workflows/homebrew.yml"
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "Tools/release/container-compose.rb.in"
      - "Tools/release/update-homebrew-formula.py"
      - "Tools/release/test_update_homebrew_formula.py"
      - ".github/workflows/homebrew.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: homebrew-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  formula:
    name: Formula Template
    runs-on: macos-26
    steps:
      - name: Checkout container-compose
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Validate formula template syntax
        shell: bash
        run: |
          set -euo pipefail
          ruby -c Tools/release/container-compose.rb.in

      - name: Validate formula update helper
        shell: bash
        run: |
          set -euo pipefail
          python3 -m unittest Tools/release/test_update_homebrew_formula.py
