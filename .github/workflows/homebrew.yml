name: Homebrew

on:
  push:
    branches:
      - main
      - release
      - "release-*"
    paths:
      - "Formula/**"
      - ".github/workflows/homebrew.yml"
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "Formula/**"
      - ".github/workflows/homebrew.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: homebrew-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  formula:
    name: Formula Syntax
    runs-on: macos-26
    steps:
      - name: Checkout container-compose
        uses: actions/checkout@v7

      - name: Validate Ruby syntax
        shell: bash
        run: |
          set -euo pipefail
          ruby -c Formula/container-compose.rb

      - name: Tap local formula
        shell: bash
        run: |
          set -euo pipefail
          brew tap stephenlclarke/tap
          brew trust --tap stephenlclarke/tap
          brew tap stephenlclarke/container-compose "${GITHUB_WORKSPACE}"
          brew trust --tap stephenlclarke/container-compose

      - name: Audit formula
        shell: bash
        run: |
          set -euo pipefail
          brew audit --formula --strict --online stephenlclarke/container-compose/container-compose

      - name: Fetch formula archive
        shell: bash
        run: |
          set -euo pipefail
          brew fetch --formula --force stephenlclarke/container-compose/container-compose

      - name: Install and test formula
        shell: bash
        run: |
          set -euo pipefail
          brew install --formula stephenlclarke/container-compose/container-compose
          brew test stephenlclarke/container-compose/container-compose

      - name: Inspect formula
        shell: bash
        run: |
          set -euo pipefail
          brew info --formula stephenlclarke/container-compose/container-compose
