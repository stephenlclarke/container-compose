name: Homebrew

on:
  push:
    branches:
      - release
      - develop
  pull_request:
    branches:
      - release
      - develop
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: homebrew-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  formula:
    name: Formula Syntax
    runs-on: macos-26
    steps:
      - name: Checkout container-compose
        uses: actions/checkout@v6

      - name: Validate Ruby syntax
        run: ruby -c Formula/container-compose.rb

      - name: Inspect formula
        run: |
          brew tap stephenlclarke/container-compose "${GITHUB_WORKSPACE}"
          brew info --formula stephenlclarke/container-compose/container-compose
