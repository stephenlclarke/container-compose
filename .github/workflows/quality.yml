name: Quality

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/quality.yml"
      - ".swiftformat"
      - ".swiftlint.yml"
      - "Package.swift"
      - "Package.resolved"
      - "Sources/**"
      - "Tests/**"
      - "Tools/ci/run-swift-test.sh"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/quality.yml"
      - ".swiftformat"
      - ".swiftlint.yml"
      - "Package.swift"
      - "Package.resolved"
      - "Sources/**"
      - "Tests/**"
      - "Tools/ci/run-swift-test.sh"
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Relevant Changes
    runs-on: ubuntu-latest
    outputs:
      heavy: ${{ steps.filter.outputs.heavy }}
      swift: ${{ steps.filter.outputs.swift }}
    steps:
      - name: Checkout for push diff
        if: github.event_name == 'push'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          changed_files="${RUNNER_TEMP}/changed-files.txt"

          case "${GITHUB_EVENT_NAME}" in
            pull_request)
              gh api "repos/${GITHUB_REPOSITORY}/pulls/${{ github.event.pull_request.number }}/files" \
                --paginate \
                --jq '.[].filename' > "$changed_files"
              ;;
            push)
              before="${{ github.event.before }}"
              after="${GITHUB_SHA}"
              if [[ "$before" =~ ^0+$ ]] || ! git cat-file -e "$before^{commit}" 2>/dev/null; then
                git diff-tree --no-commit-id --name-only -r "$after" > "$changed_files"
              else
                git diff --name-only "$before" "$after" > "$changed_files"
              fi
              ;;
            *)
              printf 'heavy=true\n' >> "$GITHUB_OUTPUT"
              printf 'swift=true\n' >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          heavy=false
          swift=false
          while IFS= read -r path; do
            case "$path" in
              *.md|docs/*|Formula/*)
                ;;
              *)
                heavy=true
                ;;
            esac
            case "$path" in
              Package.swift|Package.resolved|Sources/**|Tests/**|*.swift)
                swift=true
                ;;
            esac
          done < "$changed_files"

          printf 'heavy=%s\n' "$heavy" >> "$GITHUB_OUTPUT"
          printf 'swift=%s\n' "$swift" >> "$GITHUB_OUTPUT"

  swift-address-sanitizer:
    name: Swift ASan
    needs: changes
    if: (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') && needs.changes.outputs.swift == 'true'
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Checkout container-compose
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: container-compose
          fetch-depth: 0

      - name: Resolve stack refs
        id: stack-refs
        shell: bash
        working-directory: container-compose
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          manifest = Path("Tools/release/stack-refs.json")
          if not manifest.exists():
              print("containerization_ref=")
              raise SystemExit(0)

          data = json.loads(manifest.read_text(encoding="utf-8"))
          components = data.get("components", {})
          print(f"containerization_ref={components.get('containerization', {}).get('ref', '')}")
          PY

      - name: Resolve container ref
        id: apple-container-ref
        shell: bash
        run: |
          set -euo pipefail
          ref="$(python3 container-compose/Tools/release/resolve-container-ref.py --stack-refs container-compose/Tools/release/stack-refs.json)"
          if [[ -z "$ref" ]]; then
            printf 'container ref is empty\n' >&2
            exit 1
          fi
          printf 'ref=%s\n' "$ref" >> "$GITHUB_OUTPUT"

      - name: Checkout container dependency
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: stephenlclarke/container
          path: container
          ref: ${{ steps.apple-container-ref.outputs.ref }}

      - name: Checkout containerization dependency
        if: steps.stack-refs.outputs.containerization_ref != ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: stephenlclarke/containerization
          path: containerization
          ref: ${{ steps.stack-refs.outputs.containerization_ref }}

      - name: Verify container dependency ref
        shell: bash
        run: |
          set -euo pipefail
          actual="$(git -C container rev-parse HEAD)"
          expected="${{ steps.apple-container-ref.outputs.ref }}"
          if [[ "$actual" != "$expected" ]]; then
            printf 'container checkout mismatch: expected %s, got %s\n' "$expected" "$actual" >&2
            exit 1
          fi

      - name: Verify containerization dependency ref
        if: steps.stack-refs.outputs.containerization_ref != ''
        shell: bash
        run: |
          set -euo pipefail
          actual="$(git -C containerization rev-parse HEAD)"
          expected="${{ steps.stack-refs.outputs.containerization_ref }}"
          if [[ "$actual" != "$expected" ]]; then
            printf 'containerization checkout mismatch: expected %s, got %s\n' "$expected" "$actual" >&2
            exit 1
          fi

      - name: Compute SwiftPM sanitizer cache fingerprint
        id: swiftpm-cache
        shell: bash
        run: |
          set -euo pipefail
          {
            swift --version 2>&1
            shasum -a 256 container-compose/Package.swift container-compose/Package.resolved
            printf 'container_ref=%s\n' "${{ steps.apple-container-ref.outputs.ref }}"
            printf 'containerization_ref=%s\n' "${{ steps.stack-refs.outputs.containerization_ref }}"
            shasum -a 256 container/Package.swift container/Package.resolved
            if [[ -f containerization/Package.swift ]]; then
              shasum -a 256 containerization/Package.swift containerization/Package.resolved
            fi
          } | shasum -a 256 | awk '{ printf "fingerprint=%s\n", $1 }' >> "$GITHUB_OUTPUT"

      - name: Cache SwiftPM ASan artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            container-compose/.build
            container-compose/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-${{ runner.arch }}-macos26-swiftpm-asan-v1-${{ steps.swiftpm-cache.outputs.fingerprint }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-macos26-swiftpm-asan-v1-

      - name: Use checked-out containerization dependency
        if: steps.stack-refs.outputs.containerization_ref != ''
        run: Tools/ci/use-stack-containerization.sh ../containerization
        working-directory: container-compose

      - name: Print toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: container-compose/Tools/compose-normalizer/go.mod
          cache-dependency-path: container-compose/Tools/compose-normalizer/go.sum

      - name: Run Swift tests with Address Sanitizer
        run: |
          SWIFT_TEST_RESULT_LOG=.build/swift-asan.log \
            SWIFT_TEST_ATTEMPTS=2 \
            Tools/ci/run-swift-test.sh swift test --disable-automatic-resolution --sanitize=address --no-parallel
        working-directory: container-compose

  swift-thread-sanitizer:
    name: Swift TSan Nightly
    needs: changes
    if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && needs.changes.outputs.swift == 'true'
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - name: Checkout container-compose
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: container-compose
          fetch-depth: 0

      - name: Resolve stack refs
        id: stack-refs
        shell: bash
        working-directory: container-compose
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          manifest = Path("Tools/release/stack-refs.json")
          if not manifest.exists():
              print("containerization_ref=")
              raise SystemExit(0)

          data = json.loads(manifest.read_text(encoding="utf-8"))
          components = data.get("components", {})
          print(f"containerization_ref={components.get('containerization', {}).get('ref', '')}")
          PY

      - name: Resolve container ref
        id: apple-container-ref
        shell: bash
        run: |
          set -euo pipefail
          ref="$(python3 container-compose/Tools/release/resolve-container-ref.py --stack-refs container-compose/Tools/release/stack-refs.json)"
          if [[ -z "$ref" ]]; then
            printf 'container ref is empty\n' >&2
            exit 1
          fi
          printf 'ref=%s\n' "$ref" >> "$GITHUB_OUTPUT"

      - name: Checkout container dependency
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: stephenlclarke/container
          path: container
          ref: ${{ steps.apple-container-ref.outputs.ref }}

      - name: Checkout containerization dependency
        if: steps.stack-refs.outputs.containerization_ref != ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: stephenlclarke/containerization
          path: containerization
          ref: ${{ steps.stack-refs.outputs.containerization_ref }}

      - name: Verify container dependency ref
        shell: bash
        run: |
          set -euo pipefail
          actual="$(git -C container rev-parse HEAD)"
          expected="${{ steps.apple-container-ref.outputs.ref }}"
          if [[ "$actual" != "$expected" ]]; then
            printf 'container checkout mismatch: expected %s, got %s\n' "$expected" "$actual" >&2
            exit 1
          fi

      - name: Verify containerization dependency ref
        if: steps.stack-refs.outputs.containerization_ref != ''
        shell: bash
        run: |
          set -euo pipefail
          actual="$(git -C containerization rev-parse HEAD)"
          expected="${{ steps.stack-refs.outputs.containerization_ref }}"
          if [[ "$actual" != "$expected" ]]; then
            printf 'containerization checkout mismatch: expected %s, got %s\n' "$expected" "$actual" >&2
            exit 1
          fi

      - name: Compute SwiftPM sanitizer cache fingerprint
        id: swiftpm-cache
        shell: bash
        run: |
          set -euo pipefail
          {
            swift --version 2>&1
            shasum -a 256 container-compose/Package.swift container-compose/Package.resolved
            printf 'container_ref=%s\n' "${{ steps.apple-container-ref.outputs.ref }}"
            printf 'containerization_ref=%s\n' "${{ steps.stack-refs.outputs.containerization_ref }}"
            shasum -a 256 container/Package.swift container/Package.resolved
            if [[ -f containerization/Package.swift ]]; then
              shasum -a 256 containerization/Package.swift containerization/Package.resolved
            fi
          } | shasum -a 256 | awk '{ printf "fingerprint=%s\n", $1 }' >> "$GITHUB_OUTPUT"

      - name: Cache SwiftPM TSan artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            container-compose/.build
            container-compose/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-${{ runner.arch }}-macos26-swiftpm-tsan-v1-${{ steps.swiftpm-cache.outputs.fingerprint }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-macos26-swiftpm-tsan-v1-

      - name: Use checked-out containerization dependency
        if: steps.stack-refs.outputs.containerization_ref != ''
        run: Tools/ci/use-stack-containerization.sh ../containerization
        working-directory: container-compose

      - name: Print toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: container-compose/Tools/compose-normalizer/go.mod
          cache-dependency-path: container-compose/Tools/compose-normalizer/go.sum

      - name: Run Swift tests with Thread Sanitizer
        run: |
          SWIFT_TEST_RESULT_LOG=.build/swift-tsan.log \
            SWIFT_TEST_ATTEMPTS=2 \
            Tools/ci/run-swift-test.sh swift test --disable-automatic-resolution --sanitize=thread --no-parallel
        working-directory: container-compose

  swift-style:
    name: SwiftLint/SwiftFormat
    needs: changes
    if: github.event_name != 'schedule' && needs.changes.outputs.swift == 'true'
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout container-compose
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Install Swift style tools
        env:
          HOMEBREW_NO_ENV_HINTS: "1"
        run: |
          set -euo pipefail
          for tap in aws/tap azure/bicep; do
            HOMEBREW_NO_REQUIRE_TAP_TRUST=1 brew untap "$tap" >/dev/null 2>&1 || true
          done
          if ! command -v swiftlint >/dev/null 2>&1; then
            HOMEBREW_REQUIRE_TAP_TRUST=1 brew install swiftlint
          fi
          if ! command -v swiftformat >/dev/null 2>&1; then
            HOMEBREW_REQUIRE_TAP_TRUST=1 brew install swiftformat
          fi
          swiftlint version
          swiftformat --version

      - name: Collect Swift style paths
        id: style-paths
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          changed_files="${RUNNER_TEMP}/changed-files.txt"
          style_paths="${RUNNER_TEMP}/swift-style-paths.txt"

          case "${GITHUB_EVENT_NAME}" in
            pull_request)
              gh api "repos/${GITHUB_REPOSITORY}/pulls/${{ github.event.pull_request.number }}/files" \
                --paginate \
                --jq '.[].filename' > "$changed_files"
              ;;
            push)
              before="${{ github.event.before }}"
              after="${GITHUB_SHA}"
              if [[ "$before" =~ ^0+$ ]] || ! git cat-file -e "$before^{commit}" 2>/dev/null; then
                git diff-tree --no-commit-id --name-only -r "$after" > "$changed_files"
              else
                git diff --name-only "$before" "$after" > "$changed_files"
              fi
              ;;
            workflow_dispatch)
              {
                if [[ -f Package.swift ]]; then
                  printf 'Package.swift\n'
                fi
                find Sources Tests -type f -name '*.swift' -print
              } > "$changed_files"
              ;;
            *)
              : > "$changed_files"
              ;;
          esac

          while IFS= read -r path; do
            # These legacy command and orchestrator files predate the strict changed-file style gate.
            case "$path" in
              Sources/ComposePlugin/ComposeCLIHelp.swift|Tests/ComposePluginTests/ComposeCLIHelpTests.swift)
                continue
                ;;
              Sources/ComposePlugin/ComposePlugin.swift)
                continue
                ;;
              Sources/ComposeCore/ComposeCommitImageArchive.swift|Sources/ComposeCore/ComposeExecutionOptions.swift|Sources/ComposeCore/ComposeOrchestratorBuildAndImages.swift|Sources/ComposeCore/ComposeOrchestratorCreateAndLogs.swift|Sources/ComposeCore/ComposeOrchestratorUp.swift|Sources/ComposeCore/ComposeOrchestratorWaitAndPorts.swift|Sources/ComposeCore/ContainerDiscoveryAdapter.swift|Tests/ComposeCoreTests/ComposeOrchestratorTests.swift)
                continue
                ;;
              Sources/ComposePlugin/ContainerPackageCompatibility.swift|Tests/ComposePluginTests/ContainerPackageCompatibilityTests.swift|Tests/ComposeCoreTests/ComposeNormalizerTests.swift|Tests/ComposeRuntimeTests/ComposeRuntimeSmokeTests.swift)
                continue
                ;;
            esac
            case "$path" in
              Package.swift|Sources/*.swift|Tests/*.swift)
                printf '%s\n' "$path"
                ;;
            esac
          done < "$changed_files" | sort -u > "$style_paths"

          if [[ ! -s "$style_paths" ]]; then
            printf 'No Swift style paths selected.\n'
            printf 'has_paths=false\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf 'Selected Swift style paths:\n'
          sed 's/^/  /' "$style_paths"
          printf 'has_paths=true\n' >> "$GITHUB_OUTPUT"

      - name: Run SwiftLint
        if: steps.style-paths.outputs.has_paths == 'true'
        shell: bash
        run: |
          set -euo pipefail
          style_paths=()
          while IFS= read -r path; do
            style_paths+=("$path")
          done < "${RUNNER_TEMP}/swift-style-paths.txt"
          swiftlint lint --strict --quiet "${style_paths[@]}"

      - name: Run SwiftFormat lint
        if: steps.style-paths.outputs.has_paths == 'true'
        shell: bash
        run: |
          set -euo pipefail
          style_paths=()
          while IFS= read -r path; do
            style_paths+=("$path")
          done < "${RUNNER_TEMP}/swift-style-paths.txt"
          swiftformat "${style_paths[@]}" --lint --swift-version 6.2
