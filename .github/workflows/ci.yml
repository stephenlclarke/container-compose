name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: macos-26
    steps:
      - name: Checkout container-compose
        uses: actions/checkout@v6
        with:
          path: container-compose
          fetch-depth: 0

      - name: Checkout apple/container dependency
        uses: actions/checkout@v6
        with:
          repository: apple/container
          path: container
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: container-compose/Tools/compose-normalizer/go.mod
          cache-dependency-path: container-compose/Tools/compose-normalizer/go.sum

      - name: Print toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Run local CI workflow
        run: make ci
        working-directory: container-compose

      - name: Cache SonarQube packages
        if: >
          (github.ref == 'refs/heads/main' || github.event_name == 'pull_request') &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Prefer IPv4 for Sonar GPG keyserver
        if: >
          (github.ref == 'refs/heads/main' || github.event_name == 'pull_request') &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        run: |
          # Sonar's action does not expose a keyserver override; avoid macOS runner IPv6 routes with no egress.
          keyserver_ip="$(
            python3 - <<'PY'
          import socket

          addresses = socket.getaddrinfo(
              "keyserver.ubuntu.com",
              443,
              socket.AF_INET,
              socket.SOCK_STREAM,
          )
          if not addresses:
              raise SystemExit("no IPv4 address found for keyserver.ubuntu.com")
          print(addresses[0][4][0])
          PY
          )"
          printf '%s %s\n' "$keyserver_ip" keyserver.ubuntu.com | sudo tee -a /etc/hosts >/dev/null

      - name: SonarQube scan
        if: >
          (github.ref == 'refs/heads/main' || github.event_name == 'pull_request') &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: container-compose

  package:
    name: Package Plugin
    runs-on: macos-26
    needs: validate
    steps:
      - name: Checkout container-compose
        uses: actions/checkout@v6
        with:
          path: container-compose

      - name: Checkout apple/container dependency
        uses: actions/checkout@v6
        with:
          repository: apple/container
          path: container

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: container-compose/Tools/compose-normalizer/go.mod
          cache-dependency-path: container-compose/Tools/compose-normalizer/go.sum

      - name: Print toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build plugin package
        run: make package
        working-directory: container-compose

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: container-compose-plugin
          path: container-compose/container-compose-plugin.tar.gz
