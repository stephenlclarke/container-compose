name: CI

on:
  push:
    branches:
      - main
    tags:
      - "*.*.*"
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Relevant Changes
    runs-on: ubuntu-latest
    outputs:
      heavy: ${{ steps.filter.outputs.heavy }}
    steps:
      - name: Checkout for push diff
        if: github.event_name == 'push'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          changed_files="${RUNNER_TEMP}/changed-files.txt"

          case "${GITHUB_EVENT_NAME}" in
            pull_request)
              gh api "repos/${GITHUB_REPOSITORY}/pulls/${{ github.event.pull_request.number }}/files" \
                --paginate \
                --jq '.[].filename' > "$changed_files"
              ;;
            push)
              before="${{ github.event.before }}"
              after="${GITHUB_SHA}"
              if [[ "$before" =~ ^0+$ ]] || ! git cat-file -e "$before^{commit}" 2>/dev/null; then
                git diff-tree --no-commit-id --name-only -r "$after" > "$changed_files"
              else
                git diff --name-only "$before" "$after" > "$changed_files"
              fi
              ;;
            *)
              printf 'heavy=true\n' >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          heavy=false
          while IFS= read -r path; do
            case "$path" in
              *.md|docs/*|Formula/*)
                ;;
              *)
                heavy=true
                break
                ;;
            esac
          done < "$changed_files"

          printf 'heavy=%s\n' "$heavy" >> "$GITHUB_OUTPUT"

  source_checks:
    name: Source Checks
    needs: changes
    if: needs.changes.outputs.heavy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout container-compose
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: container-compose
          fetch-depth: 0

      - name: Resolve container ref
        id: container-ref
        shell: bash
        run: |
          set -euo pipefail
          ref="$(python3 container-compose/Tools/release/resolve-container-ref.py --stack-refs container-compose/Tools/release/stack-refs.json)"
          if [[ -z "$ref" ]]; then
            printf 'container ref is empty\n' >&2
            exit 1
          fi
          printf 'ref=%s\n' "$ref" >> "$GITHUB_OUTPUT"

      - name: Checkout container dependency
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: stephenlclarke/container
          path: container
          ref: ${{ steps.container-ref.outputs.ref }}

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: container-compose/Tools/compose-normalizer/go.mod
          cache-dependency-path: container-compose/Tools/compose-normalizer/go.sum

      - name: Install Markdown lint
        run: npm install --global markdownlint-cli@0.48.0

      - name: Cache local repo tools
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: container-compose/.local/bin
          key: ${{ runner.os }}-${{ runner.arch }}-local-tools-hawkeye-v6.5.1

      - name: Run source checks
        timeout-minutes: 15
        run: make check
        working-directory: container-compose
        env:
          HAWKEYE_AUTO_INSTALL: "1"

  validate_runtime:
    name: Validate Runtime
    needs: changes
    if: needs.changes.outputs.heavy == 'true'
    runs-on: macos-26
    timeout-minutes: 75
    steps:
      - name: Checkout container-compose
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: container-compose
          fetch-depth: 0

      - name: Resolve stack refs
        id: stack-refs
        shell: bash
        working-directory: container-compose
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          manifest = Path("Tools/release/stack-refs.json")
          if not manifest.exists():
              print("containerization_ref=")
              raise SystemExit(0)

          data = json.loads(manifest.read_text(encoding="utf-8"))
          components = data.get("components", {})
          print(f"containerization_ref={components.get('containerization', {}).get('ref', '')}")
          PY

      - name: Resolve container ref
        id: container-ref
        shell: bash
        run: |
          set -euo pipefail
          ref="$(python3 container-compose/Tools/release/resolve-container-ref.py --stack-refs container-compose/Tools/release/stack-refs.json)"
          if [[ -z "$ref" ]]; then
            printf 'container ref is empty\n' >&2
            exit 1
          fi
          printf 'ref=%s\n' "$ref" >> "$GITHUB_OUTPUT"

      - name: Checkout container dependency
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: stephenlclarke/container
          path: container
          ref: ${{ steps.container-ref.outputs.ref }}

      - name: Checkout containerization dependency
        if: steps.stack-refs.outputs.containerization_ref != ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: stephenlclarke/containerization
          path: containerization
          ref: ${{ steps.stack-refs.outputs.containerization_ref }}

      - name: Verify container dependency ref
        shell: bash
        run: |
          set -euo pipefail
          actual="$(git -C container rev-parse HEAD)"
          expected="${{ steps.container-ref.outputs.ref }}"
          if [[ "$actual" != "$expected" ]]; then
            printf 'container checkout mismatch: expected %s, got %s\n' "$expected" "$actual" >&2
            exit 1
          fi

      - name: Verify containerization dependency ref
        if: steps.stack-refs.outputs.containerization_ref != ''
        shell: bash
        run: |
          set -euo pipefail
          actual="$(git -C containerization rev-parse HEAD)"
          expected="${{ steps.stack-refs.outputs.containerization_ref }}"
          if [[ "$actual" != "$expected" ]]; then
            printf 'containerization checkout mismatch: expected %s, got %s\n' "$expected" "$actual" >&2
            exit 1
          fi

      - name: Compute SwiftPM cache fingerprint
        id: swiftpm-cache
        shell: bash
        run: |
          set -euo pipefail
          {
            swift --version 2>&1
            printf 'container_ref=%s\n' "${{ steps.container-ref.outputs.ref }}"
            printf 'containerization_ref=%s\n' "${{ steps.stack-refs.outputs.containerization_ref }}"
            shasum -a 256 container-compose/Package.swift container-compose/Package.resolved
            shasum -a 256 container-compose/Makefile
            shasum -a 256 container/Package.swift container/Package.resolved
            if [[ -f containerization/Package.swift ]]; then
              shasum -a 256 containerization/Package.swift containerization/Package.resolved
            fi
          } | shasum -a 256 | awk '{ printf "fingerprint=%s\n", $1 }' >> "$GITHUB_OUTPUT"

      - name: Cache SwiftPM build artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            container-compose/.build
            container-compose/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-${{ runner.arch }}-macos26-swiftpm-v2-${{ steps.swiftpm-cache.outputs.fingerprint }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-macos26-swiftpm-v2-

      - name: Use checked-out container dependency
        run: Tools/ci/use-stack-container.sh ../container
        working-directory: container-compose

      - name: Use checked-out containerization dependency
        if: steps.stack-refs.outputs.containerization_ref != ''
        run: Tools/ci/use-stack-containerization.sh ../containerization
        working-directory: container-compose

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: container-compose/Tools/compose-normalizer/go.mod
          cache-dependency-path: container-compose/Tools/compose-normalizer/go.sum

      - name: Print toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Run quick validation
        if: github.event_name == 'pull_request'
        timeout-minutes: 45
        run: make test go-build cli-smoke-built
        working-directory: container-compose
        env:
          HAWKEYE_AUTO_INSTALL: "1"

      - name: Run coverage gate
        if: >
          github.ref == 'refs/heads/main' ||
          github.ref_type == 'tag' ||
          github.event_name == 'workflow_dispatch'
        timeout-minutes: 45
        run: make coverage-check
        working-directory: container-compose
        env:
          HAWKEYE_AUTO_INSTALL: "1"

      - name: Run built CLI smoke
        if: >
          github.ref == 'refs/heads/main' ||
          github.ref_type == 'tag' ||
          github.event_name == 'workflow_dispatch'
        timeout-minutes: 10
        run: make go-build cli-smoke-built
        working-directory: container-compose
        env:
          HAWKEYE_AUTO_INSTALL: "1"

      - name: Cache SonarQube packages
        if: github.ref == 'refs/heads/main'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Check SonarQube TCP availability
        id: sonar_tcp
        if: github.ref == 'refs/heads/main'
        env:
          SONAR_HOST: sonarcloud.io
          SONAR_PORT: "443"
        run: |
          set -euo pipefail
          if nc -z -w 5 "${SONAR_HOST}" "${SONAR_PORT}"; then
            printf 'available=true\n' >> "${GITHUB_OUTPUT}"
          else
            printf 'available=false\n' >> "${GITHUB_OUTPUT}"
          fi

      - name: Check SonarQube API availability
        id: sonar_api
        if: github.ref == 'refs/heads/main' && steps.sonar_tcp.outputs.available == 'true'
        env:
          SONAR_STATUS_URL: https://sonarcloud.io/api/system/status
        run: |
          set -euo pipefail
          set +e
          status_code="$(curl --location --silent --show-error --connect-timeout 3 --max-time 5 \
            --write-out '%{http_code}' "${SONAR_STATUS_URL}" --output /dev/null)"
          curl_status="$?"
          set -e
          if [[ "${curl_status}" -eq 0 && "${status_code}" =~ ^[1-4][0-9][0-9]$ ]]; then
            printf 'available=true\n' >> "${GITHUB_OUTPUT}"
          else
            printf 'available=false\n' >> "${GITHUB_OUTPUT}"
          fi

      - name: Install Sonar Scanner CLI
        id: sonar_install
        if: >
          github.ref == 'refs/heads/main' &&
          steps.sonar_tcp.outputs.available == 'true' &&
          steps.sonar_api.outputs.available == 'true'
        continue-on-error: true
        env:
          SONAR_SCANNER_GPG_FINGERPRINT: 679F1EE92B19609DE816FDE81DB198F93525EC1A
          SONAR_SCANNER_VERSION: 8.1.0.6389
        run: |
          case "$(uname -m)" in
            arm64)
              scanner_flavor="macosx-aarch64"
              ;;
            x86_64)
              scanner_flavor="macosx-x64"
              ;;
            *)
              printf 'Unsupported macOS architecture: %s\n' "$(uname -m)" >&2
              exit 1
              ;;
          esac

          scanner_name="sonar-scanner-cli-${SONAR_SCANNER_VERSION}-${scanner_flavor}"
          scanner_url="https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/${scanner_name}.zip"
          scanner_zip="${RUNNER_TEMP}/${scanner_name}.zip"
          scanner_signature="${scanner_zip}.asc"
          scanner_root="${RUNNER_TEMP}/sonar-scanner-cli"
          gpg_home="${RUNNER_TEMP}/sonar-scanner-gpg"

          rm -rf "$scanner_root" "$gpg_home"
          mkdir -p "$scanner_root" "$gpg_home"
          chmod 700 "$gpg_home"

          curl --fail --location --silent --show-error "$scanner_url" --output "$scanner_zip"
          curl --fail --location --silent --show-error "${scanner_url}.asc" --output "$scanner_signature"

          gpg --homedir "$gpg_home" --batch --keyserver hkps://keys.openpgp.org --recv-keys "$SONAR_SCANNER_GPG_FINGERPRINT"
          actual_fingerprint="$(
            gpg --homedir "$gpg_home" --batch --with-colons --fingerprint "$SONAR_SCANNER_GPG_FINGERPRINT" \
              | awk -F: '$1 == "fpr" { print $10; exit }'
          )"
          if [[ "$actual_fingerprint" != "$SONAR_SCANNER_GPG_FINGERPRINT" ]]; then
            printf 'Unexpected Sonar Scanner signing key fingerprint: %s\n' "$actual_fingerprint" >&2
            exit 1
          fi

          gpg --homedir "$gpg_home" --batch --verify "$scanner_signature" "$scanner_zip"
          unzip -q "$scanner_zip" -d "$scanner_root"

          scanner_bin="${scanner_root}/sonar-scanner-${SONAR_SCANNER_VERSION}-${scanner_flavor}/bin"
          if [[ ! -x "${scanner_bin}/sonar-scanner" ]]; then
            printf 'Sonar Scanner binary was not found at %s\n' "$scanner_bin" >&2
            exit 1
          fi
          printf '%s\n' "$scanner_bin" >> "$GITHUB_PATH"

      - name: SonarQube scan
        id: sonar_scan
        if: >
          github.ref == 'refs/heads/main' &&
          steps.sonar_tcp.outputs.available == 'true' &&
          steps.sonar_api.outputs.available == 'true' &&
          steps.sonar_install.outcome == 'success'
        continue-on-error: true
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_QUALITYGATE_WAIT: "true"
        run: make sonar-scan
        working-directory: container-compose

      - name: Enforce SonarQube failures when the service is available
        if: >
          github.ref == 'refs/heads/main' &&
          (steps.sonar_tcp.outputs.available != 'true' || steps.sonar_api.outputs.available != 'true' || steps.sonar_install.outcome == 'failure' || steps.sonar_scan.outcome == 'failure')
        env:
          SONAR_TCP_AVAILABLE: ${{ steps.sonar_tcp.outputs.available }}
          SONAR_API_AVAILABLE: ${{ steps.sonar_api.outputs.available }}
          SONAR_STATUS_URL: https://sonarcloud.io/api/system/status
        run: |
          set -euo pipefail
          if [[ "${SONAR_TCP_AVAILABLE}" != "true" || "${SONAR_API_AVAILABLE}" != "true" ]]; then
            printf '::warning title=SonarQube unavailable::SonarQube TCP or API preflight failed within five seconds; skipping scanner installation and analysis.\n'
            {
              printf '## SonarQube scan deferred\n\n'
              printf 'The SonarQube TCP or API preflight failed within five seconds, so this external quality scan did not delay or fail CI. Local source checks, tests, coverage gates, and CodeQL remain required.\n'
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi
          set +e
          status_code="$(curl --location --silent --show-error --connect-timeout 5 --max-time 15 \
            --retry 2 --retry-all-errors --write-out '%{http_code}' "${SONAR_STATUS_URL}" --output /dev/null)"
          curl_status="$?"
          set -e
          if [[ "${curl_status}" -eq 0 && "${status_code}" =~ ^[1-4][0-9][0-9]$ ]]; then
            printf 'SonarQube failed while its API is reachable; preserving the CI failure.\n' >&2
            exit 1
          fi
          printf '::warning title=SonarQube unavailable::Scanner installation or analysis failed while the SonarQube API was unavailable; local checks and coverage gates remain enforced.\n'
          {
            printf '## SonarQube scan deferred\n\n'
            printf 'The SonarQube API was unavailable after retries, so this external quality scan did not fail CI. Local source checks, tests, coverage gates, and CodeQL remain required.\n'
          } >> "${GITHUB_STEP_SUMMARY}"

  validate:
    name: Validate
    needs:
      - changes
      - source_checks
      - validate_runtime
    if: always() && needs.changes.outputs.heavy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check parallel validation jobs
        env:
          SOURCE_CHECKS_RESULT: ${{ needs.source_checks.result }}
          VALIDATE_RUNTIME_RESULT: ${{ needs.validate_runtime.result }}
        run: |
          set -euo pipefail
          if [[ "${SOURCE_CHECKS_RESULT}" != "success" ]]; then
            printf 'Source Checks concluded %s\n' "${SOURCE_CHECKS_RESULT}" >&2
            exit 1
          fi
          if [[ "${VALIDATE_RUNTIME_RESULT}" != "success" ]]; then
            printf 'Validate Runtime concluded %s\n' "${VALIDATE_RUNTIME_RESULT}" >&2
            exit 1
          fi
          printf 'Source Checks and Validate Runtime passed.\n'

  validate-lightweight:
    # Branch protection requires one stable aggregate context for both the
    # full and documentation/formula-only validation paths.
    name: Validate
    needs: changes
    if: needs.changes.outputs.heavy != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout container-compose
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Markdown lint
        run: npm install --global markdownlint-cli@0.48.0

      - name: Validate Markdown and formula sources
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t markdown_files < <(git ls-files '*.md' | sort)
          if (( ${#markdown_files[@]} > 0 )); then
            markdownlint "${markdown_files[@]}"
          fi
          if [[ -f Tools/release/container-compose.rb.in ]]; then
            ruby -c Tools/release/container-compose.rb.in
          fi
