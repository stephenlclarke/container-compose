name: Prebuilt Binaries

on:
  push:
    branches:
      - main
      - "develop/**"
    tags:
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: prebuilt-binaries-${{ github.ref_type }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  package:
    name: Package ${{ github.ref_name }}
    if: github.repository == 'stephenlclarke/container-compose'
    runs-on: macos-26
    steps:
      - name: Checkout container-compose
        uses: actions/checkout@v7
        with:
          path: container-compose
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Select release lane
        id: lane
        shell: bash
        working-directory: container-compose
        run: |
          set -euo pipefail
          compose_version="$(sed -n 's/^COMPOSE_VERSION ?= //p' Makefile | head -n 1)"
          case "${GITHUB_REF_TYPE}:${GITHUB_REF_NAME}" in
            branch:main)
              release_tag="homebrew-main"
              release_title="${compose_version}"
              release_label="Main lane"
              release_latest="false"
              release_prerelease="true"
              update_tap="true"
              asset="container-compose-plugin-homebrew-main-release-arm64.tar.gz"
              formula_version="$(python3 Tools/release/homebrew-main-version.py \
                --plugin-version "${compose_version}" \
                --run-number "${GITHUB_RUN_NUMBER}" \
                --sha "${GITHUB_SHA}")"
              package_lane="main"
              ;;
            tag:*)
              if [[ ! "${GITHUB_REF_NAME}" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
                printf 'Stable release tags must be bare semver: %s\n' "${GITHUB_REF_NAME}" >&2
                exit 1
              fi
              if [[ "${compose_version}" != "${GITHUB_REF_NAME}" ]]; then
                printf 'COMPOSE_VERSION %s does not match stable tag %s\n' "${compose_version}" "${GITHUB_REF_NAME}" >&2
                exit 1
              fi
              release_tag="${GITHUB_REF_NAME}"
              release_title="${compose_version}"
              release_label="Latest"
              release_latest="true"
              release_prerelease="false"
              update_tap="true"
              asset="container-compose-plugin-release-arm64.tar.gz"
              formula_version="${compose_version}"
              package_lane="stable"
              ;;
            branch:develop/*)
              branch_version="${GITHUB_REF_NAME#develop/}"
              if [[ ! "${branch_version}" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
                printf 'Develop branch must be develop/MAJOR.MINOR.PATCH: %s\n' "${GITHUB_REF_NAME}" >&2
                exit 1
              fi
              if [[ "${compose_version}" != "${branch_version}" ]]; then
                printf 'COMPOSE_VERSION %s does not match develop branch %s\n' "${compose_version}" "${GITHUB_REF_NAME}" >&2
                exit 1
              fi
              release_tag="${branch_version}-pre"
              release_title="${compose_version}"
              release_label="Pre-release"
              release_latest="false"
              release_prerelease="true"
              update_tap="false"
              asset="container-compose-plugin-release-arm64.tar.gz"
              formula_version="${compose_version}"
              package_lane="development"
              ;;
            *)
              printf 'Unsupported release ref: %s %s\n' "${GITHUB_REF_TYPE}" "${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

          {
            printf 'compose_version=%s\n' "${compose_version}"
            printf 'release_tag=%s\n' "${release_tag}"
            printf 'release_title=%s\n' "${release_title}"
            printf 'release_label=%s\n' "${release_label}"
            printf 'release_latest=%s\n' "${release_latest}"
            printf 'release_prerelease=%s\n' "${release_prerelease}"
            printf 'update_tap=%s\n' "${update_tap}"
            printf 'asset=%s\n' "${asset}"
            printf 'formula=container-compose.rb\n'
            printf 'formula_class=ContainerCompose\n'
            printf 'formula_version=%s\n' "${formula_version}"
            printf 'package_lane=%s\n' "${package_lane}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve container ref
        id: container-ref
        shell: bash
        run: |
          set -euo pipefail
          ref="$(python3 container-compose/Tools/release/resolve-container-ref.py)"
          if [[ -z "$ref" ]]; then
            printf 'container ref is empty\n' >&2
            exit 1
          fi
          printf 'ref=%s\n' "$ref" >> "$GITHUB_OUTPUT"

      - name: Checkout container dependency
        uses: actions/checkout@v7
        with:
          repository: stephenlclarke/container
          path: container
          ref: ${{ steps.container-ref.outputs.ref }}

      - name: Verify container dependency ref
        shell: bash
        run: |
          set -euo pipefail
          actual="$(git -C container rev-parse HEAD)"
          expected="${{ steps.container-ref.outputs.ref }}"
          if [[ "$actual" != "$expected" ]]; then
            printf 'container checkout mismatch: expected %s, got %s\n' "$expected" "$actual" >&2
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: container-compose/Tools/compose-normalizer/go.mod
          cache-dependency-path: container-compose/Tools/compose-normalizer/go.sum

      - name: Install Markdown lint
        run: npm install --global markdownlint-cli@0.48.0

      - name: Cache local repo tools
        uses: actions/cache@v6
        with:
          path: container-compose/.local/bin
          key: ${{ runner.os }}-${{ runner.arch }}-local-tools-hawkeye-v6.5.1

      - name: Run release validation
        timeout-minutes: 45
        run: make ci
        working-directory: container-compose
        env:
          HAWKEYE_AUTO_INSTALL: "1"

      - name: Build release package
        run: make package-release PLUGIN_ARCHIVE="${RUNNER_TEMP}/${{ steps.lane.outputs.asset }}"
        working-directory: container-compose
        env:
          CONTAINER_COMPOSE_BRANCH: ${{ github.ref_name }}
          CONTAINER_COMPOSE_COMMIT: ${{ github.sha }}
          CONTAINER_COMPOSE_LANE: ${{ steps.lane.outputs.package_lane }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.lane.outputs.asset }}
          path: |
            ${{ runner.temp }}/${{ steps.lane.outputs.asset }}
            ${{ runner.temp }}/${{ steps.lane.outputs.asset }}.sha256

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          ASSET: ${{ steps.lane.outputs.asset }}
          COMPOSE_VERSION: ${{ steps.lane.outputs.compose_version }}
          RELEASE_TAG: ${{ steps.lane.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.lane.outputs.release_title }}
          RELEASE_LABEL: ${{ steps.lane.outputs.release_label }}
          RELEASE_LATEST: ${{ steps.lane.outputs.release_latest }}
          RELEASE_PRERELEASE: ${{ steps.lane.outputs.release_prerelease }}
        shell: bash
        working-directory: container-compose
        run: |
          set -euo pipefail
          sha256="$(awk '{print $1}' "${RUNNER_TEMP}/${ASSET}.sha256")"

          notes="$(mktemp)"
          git fetch --force --tags origin
          python3 Tools/release/release-notes.py \
            --release-tag "${RELEASE_TAG}" \
            --release-label "${RELEASE_LABEL}" \
            --compose-version "${COMPOSE_VERSION}" \
            --asset "${ASSET}" \
            --asset-sha "${sha256}" \
            --head "${GITHUB_SHA}" > "${notes}"

          if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
            git tag --force "${RELEASE_TAG}" "${GITHUB_SHA}"
            git push --force origin "refs/tags/${RELEASE_TAG}"
          fi

          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            create_args=(
              gh release create "${RELEASE_TAG}"
              --target "${GITHUB_SHA}"
              --title "${RELEASE_TITLE}"
              --notes-file "${notes}"
            )
            if [[ "${RELEASE_PRERELEASE}" == "true" ]]; then
              create_args+=(--prerelease)
            fi
            if [[ "${RELEASE_LATEST}" == "true" ]]; then
              create_args+=(--latest)
            else
              create_args+=(--latest=false)
            fi
            "${create_args[@]}"
          else
            edit_args=(
              gh release edit "${RELEASE_TAG}"
              --target "${GITHUB_SHA}"
              --title "${RELEASE_TITLE}"
              --notes-file "${notes}"
            )
            if [[ "${RELEASE_PRERELEASE}" == "true" ]]; then
              edit_args+=(--prerelease)
            fi
            if [[ "${RELEASE_LATEST}" == "true" ]]; then
              edit_args+=(--latest)
            else
              edit_args+=(--latest=false)
            fi
            "${edit_args[@]}"
          fi

          gh release upload "${RELEASE_TAG}" \
            "${RUNNER_TEMP}/${ASSET}" \
            "${RUNNER_TEMP}/${ASSET}.sha256" \
            --clobber

      - name: Prune older release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.lane.outputs.release_tag }}
        shell: bash
        working-directory: container-compose
        run: |
          set -euo pipefail
          python3 Tools/release/prune-release-assets.py \
            --repo "${GITHUB_REPOSITORY}" \
            --current-tag "${RELEASE_TAG}" \
            --execute

      - name: Check Homebrew tap token
        if: steps.lane.outputs.update_tap == 'true'
        id: tap-token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN}" ]]; then
            printf 'available=false\n' >> "$GITHUB_OUTPUT"
            printf 'HOMEBREW_TAP_TOKEN is not set; skipping stephenlclarke/homebrew-tap update.\n'
            exit 0
          fi
          printf 'available=true\n' >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        if: steps.lane.outputs.update_tap == 'true' && steps.tap-token.outputs.available == 'true'
        uses: actions/checkout@v7
        with:
          repository: stephenlclarke/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update Homebrew tap formula
        if: steps.lane.outputs.update_tap == 'true' && steps.tap-token.outputs.available == 'true'
        env:
          ASSET: ${{ steps.lane.outputs.asset }}
          FORMULA_VERSION: ${{ steps.lane.outputs.formula_version }}
          RELEASE_TAG: ${{ steps.lane.outputs.release_tag }}
          VERSION: ${{ steps.lane.outputs.compose_version }}
        shell: bash
        run: |
          set -euo pipefail
          url="https://github.com/stephenlclarke/container-compose/releases/download/${RELEASE_TAG}/${ASSET}"
          tmp="$(mktemp -d)"
          curl -fsSL "${url}" -o "${tmp}/${ASSET}"
          sha256="$(shasum -a 256 "${tmp}/${ASSET}" | awk '{print $1}')"
          python3 container-compose/Tools/release/update-homebrew-formula.py \
            --formula "homebrew-tap/Formula/container-compose.rb" \
            --template "homebrew-tap/Formula/container-compose.rb" \
            --formula-class ContainerCompose \
            --url "$url" \
            --version "$FORMULA_VERSION" \
            --plugin-version "$VERSION" \
            --asset "$ASSET" \
            --label "${{ steps.lane.outputs.release_label }}" \
            --sha256 "$sha256"
          ruby -c homebrew-tap/Formula/container-compose.rb
          git -C homebrew-tap diff -- Formula/container-compose.rb

      - name: Commit Homebrew tap update
        if: steps.lane.outputs.update_tap == 'true' && steps.tap-token.outputs.available == 'true'
        shell: bash
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          if git diff --quiet -- Formula/container-compose.rb; then
            printf 'Homebrew tap formula already points at %s\n' "${{ steps.lane.outputs.asset }}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/container-compose.rb
          git commit -m "chore(homebrew): update container-compose ${{ steps.lane.outputs.compose_version }}"
          git push
