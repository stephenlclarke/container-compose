name: Prebuilt Binaries

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      ref:
        description: "main for the installable current stack, or a MAJOR.MINOR.PATCH tag for stable"
        required: true
        type: string

permissions:
  actions: read
  attestations: write
  contents: write
  id-token: write

concurrency:
  # Both formulae in a lane are committed together. One global queue prevents a
  # stable promotion and a current promotion from racing the shared tap branch.
  group: container-stack-package-and-tap
  cancel-in-progress: false

jobs:
  resolve-publish-context:
    name: Resolve Publish Context
    if: >
      github.repository == 'stephenlclarke/container-compose' &&
      (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.publish.outputs.publish }}
      ref_type: ${{ steps.publish.outputs.ref_type }}
      ref_name: ${{ steps.publish.outputs.ref_name }}
      checkout_ref: ${{ steps.publish.outputs.checkout_ref }}
      sha: ${{ steps.publish.outputs.sha }}
    steps:
      - name: Resolve publish context
        id: publish
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_REF: ${{ inputs.ref }}
          WORKFLOW_RUN_EVENT: ${{ github.event.workflow_run.event }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        shell: bash
        run: |
          set -euo pipefail

          publish=false
          ref_type=""
          ref_name=""
          checkout_ref=""
          sha=""

          remote="https://github.com/${GITHUB_REPOSITORY}.git"

          resolve_remote_ref() {
            local ref="$1"
            if [[ "$ref" == "main" ]]; then
              local branch_sha
              branch_sha="$(
                git ls-remote --heads "$remote" "refs/heads/${ref}" \
                  | awk "{print \$1}" \
                  | tail -n 1
              )"
              if [[ -z "$branch_sha" ]]; then
                printf 'main branch not found: %s\n' "$ref" >&2
                exit 1
              fi
              ref_type="branch"
              ref_name="$ref"
              checkout_ref="$branch_sha"
              sha="$branch_sha"
              publish=true
              return
            fi

            if [[ "$ref" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
              local tag_sha
              tag_sha="$(
                git ls-remote --tags "$remote" "refs/tags/${ref}" "refs/tags/${ref}^{}" \
                  | awk "{print \$1}" \
                  | tail -n 1
              )"
              if [[ -z "$tag_sha" ]]; then
                printf 'stable tag not found: %s\n' "$ref" >&2
                exit 1
              fi
              ref_type="tag"
              ref_name="$ref"
              checkout_ref="$tag_sha"
              sha="$tag_sha"
              publish=true
              return
            fi

            printf 'unsupported package ref: %s\n' "$ref" >&2
            exit 1
          }

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            if [[ "${WORKFLOW_RUN_EVENT}" != "push" ]]; then
              printf 'Skipping non-push CI event: %s\n' "${WORKFLOW_RUN_EVENT}"
            else
              validate_conclusion="$(
                gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/runs/${WORKFLOW_RUN_ID}/jobs" \
                  --jq ".jobs[] | select(.name == \"Validate\") | .conclusion" \
                  | tail -n 1
              )"
              if [[ "${validate_conclusion}" != "success" ]]; then
                printf 'Skipping package publish because CI Validate concluded %s.\n' "${validate_conclusion:-missing}"
              elif [[ "${WORKFLOW_RUN_HEAD_BRANCH}" == "main" ]]; then
                current_main="$(git ls-remote --heads "${remote}" refs/heads/main | awk "{ print \$1 }" | tail -n 1)"
                if [[ "${current_main}" != "${WORKFLOW_RUN_HEAD_SHA}" ]]; then
                  printf 'Skipping superseded main CI at %s; main is now %s.\n' \
                    "${WORKFLOW_RUN_HEAD_SHA}" "${current_main:-missing}"
                  {
                    printf 'publish=false\n'
                    printf 'ref_type=\n'
                    printf 'ref_name=\n'
                    printf 'checkout_ref=\n'
                    printf 'sha=\n'
                  } >> "$GITHUB_OUTPUT"
                  exit 0
                fi
                ref_type="branch"
                ref_name="${WORKFLOW_RUN_HEAD_BRANCH}"
                checkout_ref="${WORKFLOW_RUN_HEAD_SHA}"
                sha="${WORKFLOW_RUN_HEAD_SHA}"
                publish=true
              elif [[ "${WORKFLOW_RUN_HEAD_BRANCH}" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
                printf 'Skipping CI tag package event: %s. Stable packages are created only by workflow_dispatch.\n' "${WORKFLOW_RUN_HEAD_BRANCH}"
              else
                printf 'Skipping non-package CI ref: %s\n' "${WORKFLOW_RUN_HEAD_BRANCH}"
              fi
            fi
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ -z "${DISPATCH_REF}" ]]; then
              printf 'Manual package dispatch requires ref=main or ref=MAJOR.MINOR.PATCH.\n' >&2
              exit 1
            fi
            resolve_remote_ref "${DISPATCH_REF}"
          else
            printf 'Unsupported package event: %s\n' "${GITHUB_EVENT_NAME}" >&2
            exit 1
          fi

          {
            printf 'publish=%s\n' "${publish}"
            printf 'ref_type=%s\n' "${ref_type}"
            printf 'ref_name=%s\n' "${ref_name}"
            printf 'checkout_ref=%s\n' "${checkout_ref}"
            printf 'sha=%s\n' "${sha}"
          } >> "$GITHUB_OUTPUT"

  package:
    name: Package
    needs: resolve-publish-context
    if: needs.resolve-publish-context.outputs.publish == 'true'
    runs-on: macos-26
    steps:
      - name: Checkout container-compose
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: container-compose
          fetch-depth: 0
          ref: ${{ needs.resolve-publish-context.outputs.checkout_ref }}
          token: ${{ github.token }}

      - name: Select release lane
        id: lane
        shell: bash
        working-directory: container-compose
        env:
          PUBLISH_REF_TYPE: ${{ needs.resolve-publish-context.outputs.ref_type }}
          PUBLISH_REF_NAME: ${{ needs.resolve-publish-context.outputs.ref_name }}
          PUBLISH_SHA: ${{ needs.resolve-publish-context.outputs.sha }}
        run: |
          set -euo pipefail
          compose_version="$(sed -n 's/^COMPOSE_VERSION ?= //p' Makefile | head -n 1)"
          short_sha="${PUBLISH_SHA:0:12}"
          case "${PUBLISH_REF_TYPE}:${PUBLISH_REF_NAME}" in
            branch:main)
              release_tag="current-${GITHUB_RUN_NUMBER}-${short_sha}"
              release_title="Current build · ${short_sha}"
              release_label="current build"
              release_latest="false"
              release_prerelease="true"
              update_tap="true"
              asset="container-compose-plugin-current-arm64.tar.gz"
              formula="container-compose-current.rb"
              formula_class="ContainerComposeCurrent"
              runtime_formula="container-current"
              container_formula="container-current.rb"
              container_formula_class="ContainerCurrent"
              container_compose_formula="container-compose-current"
              formula_version="current-release.${GITHUB_RUN_NUMBER}.${short_sha}"
              package_lane="current"
              ;;
            tag:*)
              if [[ ! "${PUBLISH_REF_NAME}" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
                printf 'Stable release tags must be bare semver: %s\n' "${PUBLISH_REF_NAME}" >&2
                exit 1
              fi
              if [[ "${compose_version}" != "${PUBLISH_REF_NAME}" ]]; then
                printf 'COMPOSE_VERSION %s does not match stable tag %s\n' "${compose_version}" "${PUBLISH_REF_NAME}" >&2
                exit 1
              fi
              release_tag="${PUBLISH_REF_NAME}"
              release_title="${compose_version}"
              release_label="stable release"
              release_latest="true"
              release_prerelease="false"
              update_tap="true"
              asset="container-compose-plugin-release-arm64.tar.gz"
              formula="container-compose.rb"
              formula_class="ContainerCompose"
              runtime_formula="container"
              container_formula="container.rb"
              container_formula_class="Container"
              container_compose_formula="container-compose"
              formula_version="${compose_version}"
              package_lane="stable"
              ;;
            *)
              printf 'Unsupported release ref: %s %s\n' "${PUBLISH_REF_TYPE}" "${PUBLISH_REF_NAME}" >&2
              exit 1
              ;;
          esac

          {
            printf 'compose_version=%s\n' "${compose_version}"
            printf 'release_tag=%s\n' "${release_tag}"
            printf 'release_title=%s\n' "${release_title}"
            printf 'release_label=%s\n' "${release_label}"
            printf 'release_latest=%s\n' "${release_latest}"
            printf 'release_prerelease=%s\n' "${release_prerelease}"
            printf 'update_tap=%s\n' "${update_tap}"
            printf 'asset=%s\n' "${asset}"
            printf 'formula=%s\n' "${formula}"
            printf 'formula_class=%s\n' "${formula_class}"
            printf 'runtime_formula=%s\n' "${runtime_formula}"
            printf 'container_formula=%s\n' "${container_formula}"
            printf 'container_formula_class=%s\n' "${container_formula_class}"
            printf 'container_compose_formula=%s\n' "${container_compose_formula}"
            printf 'formula_version=%s\n' "${formula_version}"
            printf 'package_lane=%s\n' "${package_lane}"
          } >> "$GITHUB_OUTPUT"

      - name: Require Homebrew tap token for formula promotion
        if: steps.lane.outputs.update_tap == 'true'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN}" ]]; then
            printf 'HOMEBREW_TAP_TOKEN is required for a stack formula promotion.\n' >&2
            exit 1
          fi

      - name: Resolve stack refs
        id: stack-refs
        shell: bash
        working-directory: container-compose
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          manifest = Path("Tools/release/stack-refs.json")
          if not manifest.exists():
              print("container_builder_shim_ref=")
              print("containerization_ref=")
              print("container_ref=")
              raise SystemExit(0)

          data = json.loads(manifest.read_text(encoding="utf-8"))
          components = data.get("components", {})

          def ref(name):
              value = components.get(name, {})
              return value.get("ref", "")

          print(f"container_builder_shim_ref={ref('container-builder-shim')}")
          print(f"containerization_ref={ref('containerization')}")
          print(f"container_ref={ref('container')}")
          PY

      - name: Resolve container ref
        id: container-ref
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ steps.stack-refs.outputs.container_ref }}"
          if [[ ! "$ref" =~ ^[0-9a-f]{40}$ ]]; then
            printf 'container stack ref is not immutable: %s\n' "$ref" >&2
            exit 1
          fi
          printf 'ref=%s\n' "$ref" >> "$GITHUB_OUTPUT"

      - name: Checkout container-builder-shim dependency
        if: steps.stack-refs.outputs.container_builder_shim_ref != ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: stephenlclarke/container-builder-shim
          path: container-builder-shim
          fetch-depth: 0
          ref: ${{ steps.stack-refs.outputs.container_builder_shim_ref }}

      - name: Checkout containerization dependency
        if: steps.stack-refs.outputs.containerization_ref != ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: stephenlclarke/containerization
          path: containerization
          fetch-depth: 0
          ref: ${{ steps.stack-refs.outputs.containerization_ref }}

      - name: Checkout container dependency
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: stephenlclarke/container
          path: container
          fetch-depth: 0
          ref: ${{ steps.container-ref.outputs.ref }}

      - name: Verify container dependency ref
        shell: bash
        run: |
          set -euo pipefail
          actual="$(git -C container rev-parse HEAD)"
          expected="${{ steps.container-ref.outputs.ref }}"
          if [[ "$actual" != "$expected" ]]; then
            printf 'container checkout mismatch: expected %s, got %s\n' "$expected" "$actual" >&2
            exit 1
          fi

      - name: Verify containerization dependency ref
        if: steps.stack-refs.outputs.containerization_ref != ''
        shell: bash
        run: |
          set -euo pipefail
          actual="$(git -C containerization rev-parse HEAD)"
          expected="${{ steps.stack-refs.outputs.containerization_ref }}"
          if [[ "$actual" != "$expected" ]]; then
            printf 'containerization checkout mismatch: expected %s, got %s\n' "$expected" "$actual" >&2
            exit 1
          fi

      - name: Require the hosted release authority
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLISH_REF_TYPE: ${{ needs.resolve-publish-context.outputs.ref_type }}
          PUBLISH_SHA: ${{ needs.resolve-publish-context.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          case "${PUBLISH_REF_TYPE}" in
            branch)
              workflow="ci.yml"
              event="push"
              required_name="green main CI (including SonarQube)"
              ;;
            tag)
              workflow="stable-release-gate.yml"
              event="workflow_dispatch"
              required_name="successful Stable Release Gate"
              ;;
            *)
              printf 'unsupported publish ref type: %s\n' "${PUBLISH_REF_TYPE}" >&2
              exit 1
              ;;
          esac

          conclusion="$(
            gh run list --repo "${GITHUB_REPOSITORY}" --workflow "${workflow}" \
              --commit "${PUBLISH_SHA}" --event "${event}" --limit 50 \
              --json status,conclusion \
              --jq 'map(select(.status == "completed" and .conclusion == "success")) | .[0].conclusion // empty'
          )"
          if [[ "${conclusion}" != "success" ]]; then
            printf 'refusing to package %s without %s at %s\n' \
              "${PUBLISH_SHA}" "${required_name}" "${PUBLISH_SHA}" >&2
            exit 1
          fi

      - name: Resolve immutable current runtime package
        id: runtime-package
        env:
          GH_TOKEN: ${{ github.token }}
          CONTAINER_REF: ${{ steps.container-ref.outputs.ref }}
        shell: bash
        run: |
          set -euo pipefail
          remote="https://github.com/stephenlclarke/container.git"
          deadline=$((SECONDS + 1800))
          while true; do
            runtime_tag="$(
              git ls-remote --tags --refs "${remote}" 'refs/tags/current-*' \
                | awk -v sha="${CONTAINER_REF}" "\$1 == sha { sub(\"refs/tags/\", \"\", \$2); print \$2 }" \
                | sort -V \
                | tail -n 1
            )"
            if [[ -n "${runtime_tag}" ]]; then
              break
            fi
            if (( SECONDS >= deadline )); then
              printf 'no immutable current runtime package exists for %s\n' "${CONTAINER_REF}" >&2
              exit 1
            fi
            printf 'waiting for current runtime package at %s\n' "${CONTAINER_REF}"
            sleep 30
          done

          if [[ ! "${runtime_tag}" =~ ^current-([0-9]+)-([0-9a-f]{12})$ ]]; then
            printf 'runtime package tag has an invalid identity: %s\n' "${runtime_tag}" >&2
            exit 1
          fi
          runtime_run="${BASH_REMATCH[1]}"
          runtime_short_sha="${BASH_REMATCH[2]}"
          runtime_asset="container-current-arm64.tar.gz"
          tmp="$(mktemp -d)"
          trap 'rm -rf "${tmp}"' EXIT
          gh release download "${runtime_tag}" --repo stephenlclarke/container \
            --pattern "${runtime_asset}.sha256" --dir "${tmp}"
          runtime_sha="$(awk '{print $1}' "${tmp}/${runtime_asset}.sha256")"
          if [[ ! "${runtime_sha}" =~ ^[0-9a-f]{64}$ ]]; then
            printf 'runtime checksum is invalid for %s\n' "${runtime_tag}" >&2
            exit 1
          fi

          {
            printf 'tag=%s\n' "${runtime_tag}"
            printf 'asset=%s\n' "${runtime_asset}"
            printf 'sha256=%s\n' "${runtime_sha}"
            printf 'version=current-release.%s.%s\n' "${runtime_run}" "${runtime_short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Use checked-out containerization dependency
        if: steps.stack-refs.outputs.containerization_ref != ''
        run: Tools/ci/use-stack-containerization.sh ../containerization
        working-directory: container-compose

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: container-compose/Tools/compose-normalizer/go.mod
          cache-dependency-path: container-compose/Tools/compose-normalizer/go.sum

      - name: Build release package
        run: make package-release PLUGIN_ARCHIVE="${RUNNER_TEMP}/${{ steps.lane.outputs.asset }}"
        working-directory: container-compose
        env:
          CONTAINER_COMPOSE_BRANCH: ${{ needs.resolve-publish-context.outputs.ref_name }}
          CONTAINER_COMPOSE_COMMIT: ${{ needs.resolve-publish-context.outputs.sha }}
          CONTAINER_COMPOSE_LANE: ${{ steps.lane.outputs.package_lane }}

      - name: Attest release package
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: ${{ runner.temp }}/${{ steps.lane.outputs.asset }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ steps.lane.outputs.asset }}
          path: |
            ${{ runner.temp }}/${{ steps.lane.outputs.asset }}
            ${{ runner.temp }}/${{ steps.lane.outputs.asset }}.sha256

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          ASSET: ${{ steps.lane.outputs.asset }}
          COMPOSE_VERSION: ${{ steps.lane.outputs.compose_version }}
          RELEASE_TAG: ${{ steps.lane.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.lane.outputs.release_title }}
          RELEASE_LABEL: ${{ steps.lane.outputs.release_label }}
          RELEASE_LATEST: ${{ steps.lane.outputs.release_latest }}
          RELEASE_PRERELEASE: ${{ steps.lane.outputs.release_prerelease }}
          PUBLISH_REF_TYPE: ${{ needs.resolve-publish-context.outputs.ref_type }}
          PUBLISH_SHA: ${{ needs.resolve-publish-context.outputs.sha }}
        shell: bash
        working-directory: container-compose
        run: |
          set -euo pipefail
          sha256="$(awk '{print $1}' "${RUNNER_TEMP}/${ASSET}.sha256")"

          notes="$(mktemp)"
          highlights="${RUNNER_TEMP}/release-highlights.json"
          git fetch --force --tags origin
          python3 Tools/release/release-notes.py \
            --release-tag "${RELEASE_TAG}" \
            --release-label "${RELEASE_LABEL}" \
            --compose-version "${COMPOSE_VERSION}" \
            --asset "${ASSET}" \
            --asset-sha "${sha256}" \
            --head "${PUBLISH_SHA}" \
            --release-repo "${GITHUB_REPOSITORY}" \
            --component-repo container-builder-shim=../container-builder-shim \
            --component-repo containerization=../containerization \
            --component-repo container=../container \
            --highlights-json "${highlights}" > "${notes}"

          tag_target="$(
            git ls-remote --tags origin "refs/tags/${RELEASE_TAG}" "refs/tags/${RELEASE_TAG}^{}" \
              | awk '$2 ~ /\^\{\}$/ { print $1 }' \
              | tail -n 1
          )"
          if [[ -z "${tag_target}" ]]; then
            tag_target="$(
              git ls-remote --tags --refs origin "refs/tags/${RELEASE_TAG}" \
                | awk '{ print $1 }' \
                | tail -n 1
            )"
          fi
          if [[ -n "$tag_target" && "$tag_target" != "$PUBLISH_SHA" ]]; then
            printf 'release tag %s already points at %s, refusing to retarget it to %s\n' \
              "$RELEASE_TAG" "$tag_target" "$PUBLISH_SHA" >&2
            exit 1
          fi
          if [[ "${PUBLISH_REF_TYPE}" == "tag" && -z "${tag_target}" ]]; then
            printf 'stable release tag is missing: %s\n' "${RELEASE_TAG}" >&2
            exit 1
          fi

          RELEASE_REPOSITORY="${GITHUB_REPOSITORY}" \
            RELEASE_TAG="${RELEASE_TAG}" \
            RELEASE_TITLE="${RELEASE_TITLE}" \
            RELEASE_NOTES_FILE="${notes}" \
            RELEASE_HIGHLIGHTS_PATH="${highlights}" \
            RELEASE_LATEST="${RELEASE_LATEST}" \
            RELEASE_PRERELEASE="${RELEASE_PRERELEASE}" \
            PUBLISH_REF_TYPE="${PUBLISH_REF_TYPE}" \
            PUBLISH_SHA="${PUBLISH_SHA}" \
            RELEASE_ASSET_PATH="${RUNNER_TEMP}/${ASSET}" \
            RELEASE_CHECKSUM_PATH="${RUNNER_TEMP}/${ASSET}.sha256" \
            Tools/release/publish-github-release.sh

      - name: Checkout Homebrew tap
        if: steps.lane.outputs.update_tap == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: stephenlclarke/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Render matched Homebrew stack formulae
        if: steps.lane.outputs.update_tap == 'true'
        env:
          ASSET: ${{ steps.lane.outputs.asset }}
          FORMULA: ${{ steps.lane.outputs.formula }}
          FORMULA_CLASS: ${{ steps.lane.outputs.formula_class }}
          FORMULA_VERSION: ${{ steps.lane.outputs.formula_version }}
          RUNTIME_FORMULA: ${{ steps.lane.outputs.runtime_formula }}
          CONTAINER_FORMULA: ${{ steps.lane.outputs.container_formula }}
          CONTAINER_FORMULA_CLASS: ${{ steps.lane.outputs.container_formula_class }}
          CONTAINER_COMPOSE_FORMULA: ${{ steps.lane.outputs.container_compose_formula }}
          RUNTIME_RELEASE_TAG: ${{ steps.runtime-package.outputs.tag }}
          RUNTIME_ASSET: ${{ steps.runtime-package.outputs.asset }}
          RUNTIME_SHA256: ${{ steps.runtime-package.outputs.sha256 }}
          RUNTIME_VERSION: ${{ steps.runtime-package.outputs.version }}
          RELEASE_TAG: ${{ steps.lane.outputs.release_tag }}
          VERSION: ${{ steps.lane.outputs.compose_version }}
        shell: bash
        run: |
          set -euo pipefail
          url="https://github.com/stephenlclarke/container-compose/releases/download/${RELEASE_TAG}/${ASSET}"
          tmp="$(mktemp -d)"
          trap 'rm -rf "${tmp}"' EXIT

          download_release_asset() {
            local attempt max_attempts status
            max_attempts=6
            for attempt in $(seq 1 "${max_attempts}"); do
              printf 'Downloading %s (attempt %s/%s)\n' "${url}" "${attempt}" "${max_attempts}"
              if curl -fsSL --connect-timeout 20 --max-time 180 "${url}" -o "${tmp}/${ASSET}"; then
                if [[ -s "${tmp}/${ASSET}" ]]; then
                  return 0
                fi
                status=1
                printf 'Downloaded asset is empty: %s\n' "${tmp}/${ASSET}" >&2
              else
                status="$?"
              fi

              if (( attempt == max_attempts )); then
                return "${status}"
              fi
              sleep "$((attempt * 10))"
            done
          }

          download_release_asset
          sha256="$(shasum -a 256 "${tmp}/${ASSET}" | awk '{print $1}')"
          python3 container-compose/Tools/release/update-homebrew-formula.py \
            --formula "homebrew-tap/Formula/${FORMULA}" \
            --template "container-compose/Tools/release/container-compose.rb.in" \
            --formula-class "${FORMULA_CLASS}" \
            --runtime-formula "${RUNTIME_FORMULA}" \
            --url "$url" \
            --version "$FORMULA_VERSION" \
            --plugin-version "$VERSION" \
            --asset "$ASSET" \
            --label "${{ steps.lane.outputs.release_label }}" \
            --sha256 "$sha256"

          runtime_url="https://github.com/stephenlclarke/container/releases/download/${RUNTIME_RELEASE_TAG}/${RUNTIME_ASSET}"
          gh release download "${RUNTIME_RELEASE_TAG}" --repo stephenlclarke/container \
            --pattern "${RUNTIME_ASSET}" --dir "${tmp}"
          actual_runtime_sha="$(shasum -a 256 "${tmp}/${RUNTIME_ASSET}" | awk '{print $1}')"
          if [[ "${actual_runtime_sha}" != "${RUNTIME_SHA256}" ]]; then
            printf 'runtime package checksum mismatch: expected %s, got %s\n' \
              "${RUNTIME_SHA256}" "${actual_runtime_sha}" >&2
            exit 1
          fi
          python3 container/scripts/update-homebrew-formula.py \
            --formula "homebrew-tap/Formula/${CONTAINER_FORMULA}" \
            --template "container/Formula/container.rb" \
            --formula-class "${CONTAINER_FORMULA_CLASS}" \
            --compose-formula "${CONTAINER_COMPOSE_FORMULA}" \
            --url "${runtime_url}" \
            --sha256 "${RUNTIME_SHA256}" \
            --version "${RUNTIME_VERSION}" \
            --label "${{ steps.lane.outputs.release_label }}" \
            --asset "${RUNTIME_ASSET}"
          ruby -c "homebrew-tap/Formula/${FORMULA}"
          ruby -c "homebrew-tap/Formula/${CONTAINER_FORMULA}"
          git -C homebrew-tap diff -- "Formula/${FORMULA}" "Formula/${CONTAINER_FORMULA}"

      - name: Commit atomic Homebrew stack update
        if: steps.lane.outputs.update_tap == 'true'
        shell: bash
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          compose_formula="${{ steps.lane.outputs.formula }}"
          container_formula="${{ steps.lane.outputs.container_formula }}"
          if [[ -z "$(git status --porcelain -- "Formula/${compose_formula}" "Formula/${container_formula}")" ]]; then
            printf 'Homebrew tap formulae already point at the matched %s stack.\n' \
              "${{ steps.lane.outputs.package_lane }}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "Formula/${compose_formula}" "Formula/${container_formula}"
          git commit -m "chore(homebrew): update ${{ steps.lane.outputs.package_lane }} stack ${{ steps.lane.outputs.compose_version }}"
          git push

      - name: Retain only current release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        working-directory: container-compose
        run: |
          set -euo pipefail
          python3 Tools/release/retain-release-assets.py \
            --repo "${GITHUB_REPOSITORY}" \
            --bootstrap-command "brew install go node python" \
            --build-command "make package" \
            --install-command "sudo rm -rf /usr/local/libexec/container-plugins/compose && sudo install -d /usr/local/libexec/container-plugins && sudo tar -xzf container-compose-plugin-release-arm64.tar.gz -C /usr/local/libexec/container-plugins" \
            --apply
