name: Documentation

on:
  schedule:
    - cron: '17 3 * * *'
  push:
    branches: [main]
    paths:
      - .github/workflows/docs.yml
      - DESIGN.md
      - Makefile
      - Package.resolved
      - Package.swift
      - README.md
      - Sources/**
      - scripts/make-docs.sh
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/docs.yml
      - DESIGN.md
      - Makefile
      - Package.resolved
      - Package.swift
      - README.md
      - Sources/**
      - scripts/make-docs.sh
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: documentation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build DocC Site
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Checkout container-compose
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Checkout container
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: stephenlclarke/container
          ref: main
          path: upstreams/container

      - name: Checkout containerization
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: stephenlclarke/containerization
          ref: main
          path: upstreams/containerization

      - name: Checkout container-k8s
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: stephenlclarke/container-k8s
          ref: main
          path: upstreams/container-k8s

      - name: Build static API documentation
        run: |
          make docs
          scripts/add-upstream-docc-sites.sh \
            _site \
            "$GITHUB_WORKSPACE/upstreams/container" \
            "$GITHUB_WORKSPACE/upstreams/containerization" \
            "$GITHUB_WORKSPACE/upstreams/container-k8s"

      # upload-pages-artifact requires GNU tar, which is unavailable on the
      # macOS runner used to build this Swift package. Transfer the DocC
      # output to an Ubuntu job for the Pages-specific artifact upload.
      - name: Archive DocC site
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && github.repository == 'stephenlclarke/container-compose'
        run: tar -czf api-docs.tgz -C _site .

      - name: Save DocC site
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && github.repository == 'stephenlclarke/container-compose'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: api-docs
          path: api-docs.tgz
          retention-days: 1

  upload-pages-artifact:
    name: Upload GitHub Pages Artifact
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && github.repository == 'stephenlclarke/container-compose'
    runs-on: ubuntu-latest
    permissions:
      pages: write
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Download DocC site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: api-docs

      - name: Extract DocC site
        run: |
          set -euo pipefail
          mkdir _site
          tar -xzf api-docs.tgz -C _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: _site

  deploy:
    name: Deploy GitHub Pages
    needs: upload-pages-artifact
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && github.repository == 'stephenlclarke/container-compose'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
