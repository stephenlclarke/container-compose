name: Verify Upstream PR Archives

on:
  push:
    branches: [main]
    paths:
      - docs/upstream/PR-ARCHIVE.json
      - Tools/upstream/verify-pr-archive.py
      - Tools/upstream/test_verify_pr_archive.py
      - .github/workflows/upstream-pr-archive.yml
  pull_request:
    branches: [main]
    paths:
      - docs/upstream/PR-ARCHIVE.json
      - Tools/upstream/verify-pr-archive.py
      - Tools/upstream/test_verify_pr_archive.py
      - .github/workflows/upstream-pr-archive.yml
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify Immutable Snapshots
    runs-on: ubuntu-latest
    steps:
      - name: Checkout container-compose
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Validate archive ledger
        run: python3 Tools/upstream/verify-pr-archive.py --validate-only

      - name: Verify remote archive snapshots
        run: python3 Tools/upstream/verify-pr-archive.py
