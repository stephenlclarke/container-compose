name: Stable Release Gate

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Bare semantic tag to validate and promote"
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: stable-release-gate-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  resolve-candidate:
    name: Resolve Stable Candidate
    if: github.repository == 'stephenlclarke/container-compose'
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.candidate.outputs.sha }}
      homebrew_tap_ref: ${{ steps.candidate.outputs.homebrew_tap_ref }}
    steps:
      - name: Require an immutable main tag and green main CI
        id: candidate
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.ref }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_TAG}" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            printf 'stable release ref must be a bare semantic tag: %s\n' "${RELEASE_TAG}" >&2
            exit 1
          fi

          remote="https://github.com/${GITHUB_REPOSITORY}.git"
          tag_sha="$(
            git ls-remote --tags "${remote}" "refs/tags/${RELEASE_TAG}" "refs/tags/${RELEASE_TAG}^{}" \
              | awk '$2 ~ /\^\{\}$/ { print $1 }' \
              | tail -n 1
          )"
          if [[ -z "${tag_sha}" ]]; then
            tag_sha="$(
              git ls-remote --tags --refs "${remote}" "refs/tags/${RELEASE_TAG}" \
                | awk '{ print $1 }' \
                | tail -n 1
            )"
          fi
          main_sha="$(git ls-remote --heads "${remote}" refs/heads/main | awk '{ print $1 }' | tail -n 1)"
          if [[ ! "${tag_sha}" =~ ^[0-9a-f]{40}$ ]] || [[ -z "${main_sha}" ]]; then
            printf 'could not resolve stable tag %s or main\n' "${RELEASE_TAG}" >&2
            exit 1
          fi
          tag_object="$(
            gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" --jq '.object.sha'
          )"
          tag_verified="$(
            gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object}" --jq '.verification.verified'
          )"
          if [[ "${tag_verified}" != "true" ]]; then
            printf 'stable tag %s is not GitHub-verified\n' "${RELEASE_TAG}" >&2
            exit 1
          fi

          latest_stable_tag="$(
            git ls-remote --tags --refs "${remote}" \
              | awk '{ sub("^refs/tags/", "", $2); print $2 }' \
              | awk '/^[0-9]+[.][0-9]+[.][0-9]+$/' \
              | sort -V \
              | tail -n 1
          )"
          if [[ "${latest_stable_tag}" != "${RELEASE_TAG}" ]]; then
            printf 'stable tag %s is not the latest semantic source tag (%s)\n' \
              "${RELEASE_TAG}" "${latest_stable_tag:-missing}" >&2
            exit 1
          fi

          release_output=""
          set +e
          release_output="$(
            gh api --silent "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" 2>&1
          )"
          release_status=$?
          set -e
          if (( release_status == 0 )); then
            printf 'stable release %s already exists and is immutable\n' "${RELEASE_TAG}" >&2
            exit 1
          fi
          if [[ "${release_output}" != *"HTTP 404"* ]]; then
            printf 'could not determine whether stable release %s exists:\n%s\n' \
              "${RELEASE_TAG}" "${release_output}" >&2
            exit 1
          fi

          if [[ "${tag_sha}" != "${main_sha}" ]]; then
            printf 'stable tag %s no longer matches main; accepting its GitHub-verified unpublished source for a release retry\n' \
              "${RELEASE_TAG}"
          fi

          homebrew_tap_ref="$(
            git ls-remote --heads https://github.com/stephenlclarke/homebrew-tap.git refs/heads/main \
              | awk '{ print $1 }' \
              | tail -n 1
          )"
          if [[ ! "${homebrew_tap_ref}" =~ ^[0-9a-f]{40}$ ]]; then
            printf 'could not resolve an immutable homebrew-tap main revision\n' >&2
            exit 1
          fi

          deadline=$((SECONDS + 3600))
          while true; do
            run="$(
              gh run list --repo "${GITHUB_REPOSITORY}" --workflow ci.yml --commit "${tag_sha}" \
                --event push --limit 20 --json databaseId,status,conclusion,headBranch \
                --jq 'map(select(.headBranch == "main") | select(.status == "completed" or .status == "in_progress" or .status == "queued")) | .[0] // empty'
            )"
            status="$(jq -r '.status // empty' <<<"${run}")"
            conclusion="$(jq -r '.conclusion // empty' <<<"${run}")"
            if [[ "${status}" == "completed" && "${conclusion}" == "success" ]]; then
              break
            fi
            if [[ "${status}" == "completed" ]]; then
              printf 'main CI for %s concluded %s\n' "${tag_sha}" "${conclusion:-missing}" >&2
              exit 1
            fi
            if (( SECONDS >= deadline )); then
              printf 'timed out waiting for green main CI (including SonarQube) at %s\n' "${tag_sha}" >&2
              exit 1
            fi
            printf 'waiting for main CI (including SonarQube) at %s\n' "${tag_sha}"
            sleep 30
          done

          printf 'sha=%s\n' "${tag_sha}" >> "$GITHUB_OUTPUT"
          printf 'homebrew_tap_ref=%s\n' "${homebrew_tap_ref}" >> "$GITHUB_OUTPUT"

  release-gate:
    name: Run Hosted Release Gate
    needs: resolve-candidate
    runs-on: macos-26
    timeout-minutes: 120
    steps:
      - name: Checkout the stable candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: container-compose
          fetch-depth: 0
          ref: ${{ needs.resolve-candidate.outputs.sha }}

      # Stable tags are immutable, so use the immutable workflow revision for
      # release-control tooling while validating the tag checkout separately.
      - name: Checkout immutable stable-gate tools
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: release-tools
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Read exact stack refs
        id: stack-refs
        shell: bash
        working-directory: container-compose
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          components = json.loads(Path("Tools/release/stack-refs.json").read_text(encoding="utf-8"))["components"]
          for name in ("container-builder-shim", "containerization", "container"):
              ref = components[name]["ref"]
              if len(ref) != 40:
                  raise SystemExit(f"{name} ref is not immutable: {ref}")
              print(f"{name.replace('-', '_')}_ref={ref}")
          PY

      - name: Checkout pinned stack dependencies
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: stephenlclarke/container-builder-shim
          path: container-builder-shim
          fetch-depth: 0
          ref: ${{ steps.stack-refs.outputs.container_builder_shim_ref }}

      - name: Checkout pinned containerization dependency
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: stephenlclarke/containerization
          path: containerization
          fetch-depth: 0
          ref: ${{ steps.stack-refs.outputs.containerization_ref }}

      - name: Checkout pinned runtime dependency
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: stephenlclarke/container
          path: container
          fetch-depth: 0
          ref: ${{ steps.stack-refs.outputs.container_ref }}

      - name: Checkout immutable Homebrew tap snapshot
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: stephenlclarke/homebrew-tap
          path: homebrew-tap
          fetch-depth: 0
          ref: ${{ needs.resolve-candidate.outputs.homebrew_tap_ref }}

      - name: Verify immutable dependency checkouts
        env:
          BUILDER_REF: ${{ steps.stack-refs.outputs.container_builder_shim_ref }}
          CONTAINERIZATION_REF: ${{ steps.stack-refs.outputs.containerization_ref }}
          CONTAINER_REF: ${{ steps.stack-refs.outputs.container_ref }}
          HOMEBREW_TAP_REF: ${{ needs.resolve-candidate.outputs.homebrew_tap_ref }}
          CONTROL_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(git -C container-builder-shim rev-parse HEAD)" == "${BUILDER_REF}" ]]
          [[ "$(git -C containerization rev-parse HEAD)" == "${CONTAINERIZATION_REF}" ]]
          [[ "$(git -C container rev-parse HEAD)" == "${CONTAINER_REF}" ]]
          [[ "$(git -C homebrew-tap rev-parse HEAD)" == "${HOMEBREW_TAP_REF}" ]]
          [[ "$(git -C release-tools rev-parse HEAD)" == "${CONTROL_SHA}" ]]

      - name: Use pinned container dependency
        run: Tools/ci/use-stack-container.sh ../container
        working-directory: container-compose

      - name: Use pinned containerization dependency
        run: Tools/ci/use-stack-containerization.sh ../containerization
        working-directory: container-compose

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: container-compose/Tools/compose-normalizer/go.mod
          cache-dependency-path: container-compose/Tools/compose-normalizer/go.sum

      - name: Install Markdown lint
        run: npm install --global markdownlint-cli@0.48.0

      - name: Cache local repo tools
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: container-compose/.local/bin
          key: ${{ runner.os }}-${{ runner.arch }}-local-tools-hawkeye-v6.5.1

      # Each pinned repository checks its own .local/bin rather than PATH.
      # Bootstrap those verified per-repository tools before invoking the
      # immutable control-plane release gate.
      - name: Provision pinned stack tools
        shell: bash
        run: |
          set -euo pipefail
          (
            cd container-compose
            HAWKEYE_AUTO_INSTALL=1 ./scripts/install-hawkeye.sh
          )
          for repository in container-builder-shim containerization container; do
            (
              cd "${repository}"
              ./scripts/install-hawkeye.sh
            )
          done

      # GitHub-hosted macOS runners are VMs and cannot launch nested
      # Virtualization.framework guests. The release helper runs the full live
      # gate on a supported local Mac before it creates the signed source tag.
      - name: Run hosted release gate
        shell: bash
        run: |
          set -euo pipefail
          release-tools/Tools/ci/run-stack-release-validation.sh hosted \
            container-compose container-builder-shim containerization container homebrew-tap
          make -C container-compose ci
        env:
          HAWKEYE_AUTO_INSTALL: "1"

  record-release-authority:
    name: Record Stable Release Authority
    needs: [resolve-candidate, release-gate]
    if: >-
      github.repository == 'stephenlclarke/container-compose' &&
      needs.release-gate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - name: Record candidate-bound stable release authority
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.ref }}
          CANDIDATE_SHA: ${{ needs.resolve-candidate.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          authority_name="Stable Release Authority (${RELEASE_TAG})"
          details_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          summary="Hosted Stable Release Gate passed for immutable source"
          summary+=" ${CANDIDATE_SHA}."
          gh api --method POST "repos/${GITHUB_REPOSITORY}/check-runs" \
            -f "name=${authority_name}" \
            -f "head_sha=${CANDIDATE_SHA}" \
            -f 'status=completed' \
            -f 'conclusion=success' \
            -f "external_id=${GITHUB_RUN_ID}" \
            -f "details_url=${details_url}" \
            -f "output[title]=${authority_name}" \
            -f "output[summary]=${summary}" \
            --silent
