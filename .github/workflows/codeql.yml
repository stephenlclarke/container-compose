name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  schedule:
    - cron: "41 4 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Relevant Changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
    steps:
      - name: Checkout for push diff
        if: github.event_name == 'push'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          changed_files="${RUNNER_TEMP}/changed-files.txt"

          case "${GITHUB_EVENT_NAME}" in
            pull_request)
              gh api "repos/${GITHUB_REPOSITORY}/pulls/${{ github.event.pull_request.number }}/files" \
                --paginate \
                --jq '.[].filename' > "$changed_files"
              ;;
            push)
              before="${{ github.event.before }}"
              after="${GITHUB_SHA}"
              if [[ "$before" =~ ^0+$ ]] || ! git cat-file -e "$before^{commit}" 2>/dev/null; then
                git diff-tree --no-commit-id --name-only -r "$after" > "$changed_files"
              else
                git diff --name-only "$before" "$after" > "$changed_files"
              fi
              ;;
            *)
              printf 'go=true\n' >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          go=false
          while IFS= read -r path; do
            case "$path" in
              Tools/compose-normalizer/**|.github/workflows/codeql.yml|.github/codeql/**|Makefile)
                go=true
                ;;
            esac
          done < "$changed_files"

          printf 'go=%s\n' "$go" >> "$GITHUB_OUTPUT"

  analyze:
    name: Analyze Go
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout container-compose
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: Tools/compose-normalizer/go.mod
          cache-dependency-path: Tools/compose-normalizer/go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4
        with:
          languages: go
          build-mode: manual
          config-file: .github/codeql/codeql-config.yml

      - name: Build Go normalizer for CodeQL
        timeout-minutes: 10
        run: make go-build

      - name: Analyze
        uses: github/codeql-action/analyze@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4
        with:
          category: "/language:go"

  analyze-skipped:
    name: Analyze Go (No Go changes)
    needs: changes
    if: needs.changes.outputs.go != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Report skipped analysis
        run: printf 'CodeQL Go analysis skipped because this change did not touch Go normalizer or CodeQL configuration paths.\n'
