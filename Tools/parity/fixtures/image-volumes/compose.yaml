services:
  implicit:
    build:
      context: .

  overridden:
    build:
      context: .
    volumes:
      - type: volume
        source: override-data
        target: /image-data

  nocopy:
    build:
      context: .
    volumes:
      - type: volume
        source: nocopy-data
        target: /image-data
        volume:
          nocopy: true

volumes:
  override-data: {}
  nocopy-data: {}
