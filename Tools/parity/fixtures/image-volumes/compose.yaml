services:
  implicit:
    build:
      context: .

  overridden:
    build:
      context: .
    volumes:
      - type: volume
        source: override-data
        target: /image-data

  nocopy:
    build:
      context: .
    volumes:
      - type: volume
        source: nocopy-data
        target: /image-data
        volume:
          nocopy: true

  subpath-preparer:
    image: alpine:3.22
    command: ["sh", "-ec", "mkdir -p /volume/nested"]
    volumes:
      - type: volume
        source: subpath-data
        target: /volume

  subpath:
    build:
      context: .
    depends_on:
      subpath-preparer:
        condition: service_completed_successfully
    volumes:
      - type: volume
        source: subpath-data
        target: /image-data
        volume:
          subpath: nested

  generic-named:
    build:
      context: .
      dockerfile: Dockerfile.generic
    volumes:
      - type: volume
        source: generic-data
        target: /generic-data

  generic-anonymous:
    build:
      context: .
      dockerfile: Dockerfile.generic
    volumes:
      - type: volume
        target: /generic-data

  generic-nocopy:
    build:
      context: .
      dockerfile: Dockerfile.generic
    volumes:
      - type: volume
        source: generic-nocopy-data
        target: /generic-data
        volume:
          nocopy: true

  generic-missing:
    build:
      context: .
      dockerfile: Dockerfile.generic
    volumes:
      - type: volume
        source: generic-missing-data
        target: /not-in-image

volumes:
  override-data: {}
  nocopy-data: {}
  subpath-data: {}
  generic-data: {}
  generic-nocopy-data: {}
  generic-missing-data: {}
