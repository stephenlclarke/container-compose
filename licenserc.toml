additionalHeaders = [
    "scripts/container-compose-hash-header-style.toml",
    "scripts/container-compose-python-header-style.toml",
    "scripts/container-compose-slash-header-style.toml",
]

headerPath = "scripts/license-header.txt"
useDefaultMapping = false

includes = [
    ".github/workflows/*.yml",
    "Makefile",
    "Package.swift",
    "Sources/**/*.swift",
    "Tests/**/*.swift",
    "Tools/**/*.go",
    "Tools/**/*.py",
    "config.toml",
    "licenserc.toml",
    "scripts/*.sh",
    "scripts/*.toml",
    "sonar-project.properties",
]

excludes = []

[git]
attrs = "enable"
ignore = "enable"

[properties]
copyrightOwner = "container-compose project authors"

[mapping.HASH_BANNER]
extensions = ["properties", "sh", "toml", "yaml", "yml"]
filenames = ["Makefile"]

[mapping.PYTHON_BANNER]
extensions = ["py"]

[mapping.SLASH_BANNER]
extensions = ["go", "swift"]
